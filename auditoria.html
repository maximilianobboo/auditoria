<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Auditoría</title>

<link rel="icon" type="image/png" href="/logo_movil.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  padding: 20px;
}

.box {
  max-width: 520px;
  margin: auto;
  background: #111;
  padding: 25px;
  border-radius: 12px;
}

#titulo {
  background: #d32f2f;
  color: #fff;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
}

label { margin-top:10px; margin-bottom:5px; color:#ccc; font-size:14px; }

.form-control, .form-select {
  background:#222;
  color:white;
  border:1px solid #444;
}

.selected-red {
  background:#d32f2f !important;
  color:#fff !important;
  font-weight:bold;
}

.btn-main {
  background:#1976d2;
  color:white;
  width:100%;
  margin-top:15px;
  border:none;
}

.btn-row { display:flex; gap:10px; margin-top:10px; }

.btn-menu { background:#333; color:#ccc; flex:1; border:1px solid #555; }

.btn-clear { background:#2e7d32; color:white; flex:1; border:none; }

.row-flex { display:flex; gap:10px; }
.col-flex { flex:1; }

#bloque1,#bloque2,#bloque3,#bloqueMulti,#bloqueRecargas { display:none; }

.stock-row{
  display:flex;
  justify-content:center;
  gap:60px;
  margin-bottom:10px;
}

.stock-option{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.stock-option input{
  transform:scale(1.4);
  accent-color:#d32f2f;
}
</style>
</head>

<body>

<div class="box">

<h2 id="titulo"></h2>

<label>Supervisor</label>
<input id="supervisorInput" class="form-control mb-2" readonly>

<div class="row-flex">
  <div class="col-flex">
    <label>Caminante</label>
    <select id="caminanteSelect" class="form-select">
      <option value="">Seleccione</option>
    </select>
  </div>

  <div class="col-flex">
    <label>Zona</label>
    <select id="zonaSelect" class="form-select">
      <option value="">Seleccione</option>
    </select>
  </div>
</div>

<label>PSR</label>
<select id="psrSelect" class="form-select mb-2">
  <option value="">Seleccione PSR</option>
</select>

<div id="bloque1" class="row-flex">
  <div class="col-flex">
    <label>Material POP</label>
    <select id="materialPOP" class="form-select">
      <option value="">Seleccione</option>
      <option>Correcto</option>
      <option>Quemado</option>
      <option>Sin material</option>
    </select>
  </div>

  <div class="col-flex">
    <label>Stock Lotes</label>
    <select id="stockLotes" class="form-select">
      <option value="">Seleccione</option>
      <option>Correcto</option>
      <option>Incompleto</option>
      <option>Sin stock</option>
    </select>
  </div>
</div>

<div id="bloque2" class="row-flex">
  <div class="col-flex">
    <label>Claro Pay</label>
    <select id="claroPay" class="form-select">
      <option value="">Seleccione</option>
      <option>Si</option>
      <option>No</option>
    </select>
  </div>

  <div class="col-flex">
    <label>Claro Comercios</label>
    <select id="claroComercios" class="form-select">
      <option value="">Seleccione</option>
      <option>Si</option>
      <option>No</option>
    </select>
  </div>
</div>

<div id="bloque3" class="row-flex">
  <div class="col-flex">
    <label>Referidos</label>
    <select id="referidos" class="form-select">
      <option value="">Seleccione</option>
      <option>Conoce</option>
      <option>No conoce</option>
    </select>
  </div>

  <div class="col-flex">
    <label>SIM</label>
    <select id="sim" class="form-select">
      <option value="">Seleccione</option>
      <option>Posee</option>
      <option>No posee</option>
    </select>
  </div>
</div>

<div id="bloqueMulti">
  <label>Stock Multimarca</label>
  <div class="stock-row">
    <div class="stock-option">
      <input type="radio" name="stockMulti" value="Si">
      <label>Si</label>
    </div>
    <div class="stock-option">
      <input type="radio" name="stockMulti" value="No">
      <label>No</label>
    </div>
  </div>
</div>

<div id="bloqueRecargas">

  <label>Canal recargas</label>
  <input id="canalRecargas"
         class="form-control mb-2"
         placeholder="Telerecargas, Pago Fácil, Rapipago, PIN Web, etc.">

  <label>Comisión mayorista</label>
  <input id="comisionMayorista"
         type="number"
         class="form-control mb-2">

  <div class="row-flex">

    <div class="col-flex">
      <label>Costo fijo por uso de multimarca</label>
      <input id="costoFijo"
             type="number"
             class="form-control mb-2">
    </div>

    <div class="col-flex">
      <label>Monto adicional</label>

      <input id="montoAdicional"
             type="number"
             class="form-control mb-1">

      <small style="color:#aaa; font-size:12px;">
        Este ítem es el adicional que cobran a los clientes los PSRs. Si no cobran adicional colocan 0.
      </small>

    </div>

  </div>

</div>

<label>Observaciones / Puntos a mejorar</label>
<textarea id="observaciones" class="form-control mb-2" rows="3"></textarea>

<label>Adjuntar fotos</label>
<input type="file" id="fotos" class="form-control mb-2" multiple accept="image/*">

<button class="btn btn-main" onclick="enviarAuditoria()">Enviar Auditoría</button>

<div class="btn-row">
  <button class="btn btn-menu" onclick="volverMenu()">Menú</button>
  <button class="btn btn-clear" onclick="location.reload()">Borrar formulario</button>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzCcV3m9s3Q--icGcvDo6kh6GH4EVgOsSBn6iKkUwlKhr-NGA_A8tHo2_FbcmBSQw/exec";
const API_CAMINANTES = "https://script.google.com/macros/s/AKfycby6OwTzLN8f4H-GraDredyHS-4RcLKc48mZyIqvQ3ef7hFfE6GgNK8zUD5PzhVMInew6Q/exec";
const JSON_PSR = "psragencia.json";

const params = new URLSearchParams(window.location.search);
const supervisor = params.get("supervisor") || "";
const categoria = params.get("categoria") || "Auditoria";

document.getElementById("titulo").textContent =
  categoria + " - " + supervisor;

document.getElementById("supervisorInput").value = supervisor;

const caminanteSelect = document.getElementById("caminanteSelect");
const zonaSelect = document.getElementById("zonaSelect");
const psrSelect = document.getElementById("psrSelect");

const bloque1 = document.getElementById("bloque1");
const bloque2 = document.getElementById("bloque2");
const bloque3 = document.getElementById("bloque3");
const bloqueMulti = document.getElementById("bloqueMulti");
const bloqueRecargas = document.getElementById("bloqueRecargas");

function pintarSelect(select){
  if(select.value){
    select.classList.add("selected-red");
  } else {
    select.classList.remove("selected-red");
  }
}

fetch(API_CAMINANTES)
.then(r=>r.json())
.then(data=>{
  if(data[supervisor]){
    data[supervisor].forEach(c=>{
      caminanteSelect.innerHTML += `<option>${c}</option>`;
    });
  }
});

document.querySelectorAll("select").forEach(select => {
  select.addEventListener("change", () => pintarSelect(select));
});

caminanteSelect.onchange = function(){
  fetch(JSON_PSR)
  .then(r=>r.json())
  .then(data=>{
    zonaSelect.innerHTML = '<option value="">Seleccione</option>';
    [...new Set(data.filter(i=>i.Caminante===this.value).map(i=>i.Zona))]
    .forEach(z=>{
      zonaSelect.innerHTML += `<option>${z}</option>`;
    });
  });
};

zonaSelect.onchange = function(){
  fetch(JSON_PSR)
  .then(r=>r.json())
  .then(data=>{
    psrSelect.innerHTML = '<option value="">Seleccione PSR</option>';
    data.filter(i=>i.Zona===this.value)
    .forEach(p=>{
      psrSelect.innerHTML += `<option>${p["Codigo PSR"]} - ${p["Nombre PSR"]}</option>`;
    });
  });
};

psrSelect.onchange = ()=> bloque1.style.display="flex";

materialPOP.onchange = stockLotes.onchange = ()=> {
  if(materialPOP.value && stockLotes.value) bloque2.style.display="flex";
};

claroPay.onchange = claroComercios.onchange = ()=> {
  if(claroPay.value && claroComercios.value) bloque3.style.display="flex";
};

referidos.onchange = sim.onchange = ()=> {
  if(referidos.value && sim.value) bloqueMulti.style.display="block";
};

/* ✅ CORREGIDO */
document.querySelectorAll('input[name="stockMulti"]').forEach(r=>{
  r.addEventListener("change", function(){

    if(this.value === "Si"){
      bloqueRecargas.style.display = "block";
      observaciones.disabled = false;
    } else {
      bloqueRecargas.style.display = "none";
      observaciones.disabled = false;
    }

  });
});

async function enviarAuditoria(){

  const stockMulti = document.querySelector('input[name="stockMulti"]:checked');

  // 🔴 VALIDACIÓN HASTA STOCK MULTIMARCA
  if(
    !caminanteSelect.value ||
    !zonaSelect.value ||
    !psrSelect.value ||
    !materialPOP.value ||
    !stockLotes.value ||
    !claroPay.value ||
    !claroComercios.value ||
    !referidos.value ||
    !sim.value ||
    !stockMulti
  ){
    alert("❌ Debes completar todos los campos");
    return;
  }

  const files = document.getElementById("fotos").files;
  let fotos = [];

  for(let f of files){
    fotos.push(await toBase64(f));
  }

  const data = {
    supervisor,
    categoria,
    caminante: caminanteSelect.value,
    zona: zonaSelect.value,
    psr: psrSelect.value,
    materialPOP: materialPOP.value,
    stockLotes: stockLotes.value,
    claroPay: claroPay.value,
    claroComercios: claroComercios.value,
    referidos: referidos.value,
    sim: sim.value,
    stockMulti: stockMulti.value,
    canalRecargas: canalRecargas.value,
    comisionMayorista: comisionMayorista.value,
    costoFijo: costoFijo.value,
    montoAdicional: montoAdicional.value,
    observaciones: observaciones.value,
    fotos: fotos.join(", ")
  };

  fetch(URL,{method:"POST", body:JSON.stringify(data)})
  .then(()=> {
    alert("Enviado");
    window.location.href = "index.html";
  });
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

function volverMenu(){
  window.location.href="index.html";
}

</script>

</body>
</html>
