<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Prospecto</title>

  <link rel="icon" href="https://i.postimg.cc/0yX4db3M/logo-movil.png">
  <meta name="theme-color" content="#000000">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(180deg, #000000, #1a1a1a);
      color: white;
      margin: 0;
      font-family: Arial;
    }

    .container-app {
      max-width: 480px;
      margin: auto;
      min-height: 100vh;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    #titulo {
      background: #d32f2f;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    label { margin-top: 12px; color: #ccc; }

    .form-control {
      background: #222;
      border: 1px solid #444;
      color: white;
    }

    .btn-claro {
      background: #d32f2f;
      color: white;
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
    }

    .btn-back, .btn-clear {
      padding: 12px;
      border-radius: 10px;
    }

    .btn-back { background: #333; color: #ccc; }
    .btn-clear { background: #2e7d32; color: white; }

    /* ===== LOADER ===== */
    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .logo-loader {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .logo-base {
      width: 100%;
      filter: grayscale(100%) brightness(0.5);
    }

    .logo-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      clip-path: inset(100% 0 0 0);
      animation: llenar 2s cubic-bezier(0.65,0,0.35,1) infinite;
    }

    @keyframes llenar {
      0% { clip-path: inset(100% 0 0 0); }
      50% { clip-path: inset(0% 0 0 0); }
      100% { clip-path: inset(100% 0 0 0); }
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .modal-box {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 85%;
      max-width: 320px;
    }

    .btn-ok {
      background: #4caf50;
      color: white;
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="logo-loader">
    <img src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png" class="logo-base">
    <img src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png" class="logo-fill">
  </div>
</div>

<div class="container-app">

  <div id="titulo">Prospecto</div>

  <form id="form">

    <label>Nombre y Apellido</label>
    <input id="nombre" class="form-control" required>

    <label>Nombre Fantasía</label>
    <input id="fantasia" class="form-control" required>

    <label>Domicilio</label>
    <input id="domicilio" class="form-control" required>

    <label>Teléfono</label>
    <input id="telefono" class="form-control" type="number" required>

    <label>Email</label>
    <input id="email" class="form-control" type="email" required>

    <label>Observaciones</label>
    <textarea id="observaciones" class="form-control"></textarea>

    <label>Foto</label>
    <input id="foto" class="form-control" type="file" accept="image/*">

    <button class="btn btn-claro" type="submit">Enviar Auditoría</button>

    <div class="d-flex gap-2 mt-3">
      <button type="button" class="btn btn-back w-50" onclick="volver()">Menú</button>
      <button type="button" class="btn btn-clear w-50" onclick="limpiarFormulario()">Borrar formulario</button>
    </div>

  </form>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <h3>✔ Auditoría enviada</h3>
    <button class="btn-ok" onclick="cerrarModal()">OK</button>
  </div>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzBZ3QHSzgRl6UupNEnX0nebiOECLcGyjZ22h7YXEO74pLMHl3Gewuvx2K4NzagTjP7/exec";

const params = new URLSearchParams(window.location.search);
const supervisor = params.get("supervisor") || "";

document.getElementById("titulo").textContent = "Prospecto - " + supervisor;

// FUNCIONES LOADER
function mostrarLoader() {
  document.getElementById("loader").style.display = "flex";
}
function ocultarLoader() {
  document.getElementById("loader").style.display = "none";
}

// ENVIAR
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  mostrarLoader(); // 👈 clave

  const file = document.getElementById("foto").files[0];
  let base64 = "";

  if (file) {
    base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.readAsDataURL(file);
    });
  }

  const payload = {
    Supervisor: supervisor,
    Categoria: "Prospecto",
    NombreApellido: nombre.value,
    NombreFantasia: fantasia.value,
    Domicilio: domicilio.value,
    Telefono: telefono.value,
    Email: email.value,
    Observaciones: observaciones.value,
    Foto: base64
  };

  try {
    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    if (text.includes("OK")) {
      form.reset();
      modal.style.display = "flex";
    } else {
      alert("Error: " + text);
    }

  } catch {
    alert("Error de conexión ❌");
  } finally {
    ocultarLoader(); // 👈 siempre se oculta
  }
});

// MODAL
function cerrarModal() {
  modal.style.display = "none";
  window.location.href = "index.html";
}

function limpiarFormulario() {
  form.reset();
}

function volver() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
