<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Auditorias MG</title>

  <link rel="icon" href="https://i.postimg.cc/0yX4db3M/logo-movil.png">

  <meta name="theme-color" content="#000000">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(180deg, #000000, #1a1a1a);
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container-box {
      max-width: 480px;
      height: 100vh;
      margin: auto;
      text-align: center;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      width: 140px;
      margin: 20px auto;
    }

    .header {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 10px;
    }

    .selected-name {
      font-weight: bold;
      margin-bottom: 15px;
      color: #ff5252;
    }

    .btn-claro {
      background-color: #d32f2f;
      color: white;
      border: none;
      width: 100%;
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .btn-claro:hover {
      background-color: #ff5252;
      transform: scale(1.02);
    }

    .btn-back {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
    }

    .hidden { display: none; }

    /* ===== LOADER ===== */

    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity .4s ease;
    }

    .logo-loader {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .logo-base {
      width: 100%;
      filter: grayscale(100%) brightness(0.5);
    }

    .logo-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      clip-path: inset(100% 0 0 0);
      animation: llenar 2.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    }

    /* brillo */
    .logo-fill::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: rotate(25deg);
      animation: brillo 2.2s ease-in-out forwards;
    }

    @keyframes llenar {
      0% { clip-path: inset(100% 0 0 0); }
      100% { clip-path: inset(0% 0 0 0); }
    }

    @keyframes brillo {
      0% { transform: translateX(-100%) rotate(25deg); }
      100% { transform: translateX(100%) rotate(25deg); }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="logo-loader">
      <img src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png" class="logo-base">
      <img src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png" class="logo-fill">
    </div>
  </div>

  <div class="container-box">

    <img src="https://i.postimg.cc/prB8Q5s6/logo-claro.png" class="logo">

    <!-- SUPERVISORES -->
    <div id="seccion-supervisores">
      <div class="header">Seleccionar Supervisor</div>
      <div id="supervisores"></div>
    </div>

    <!-- CATEGORÍAS -->
    <div id="seccion-categorias" class="hidden">

      <div class="header">Supervisor seleccionado</div>
      <div id="nombreSupervisor" class="selected-name"></div>

      <div class="header">Seleccionar Categoría</div>

      <button class="btn btn-claro" onclick="redirigir('auditoria.html')">Auditoría</button>
      <button class="btn btn-claro" onclick="redirigir('acompanamiento.html')">Acompañamiento</button>
      <button class="btn btn-claro" onclick="redirigir('clausurado.html')">Clausurado</button>
      <button class="btn btn-claro" onclick="redirigir('prospecto.html')">Prospecto</button>

      <button class="btn btn-back" onclick="volver()">← Cambiar Supervisor</button>
    </div>

  </div>

  <script>
    let supervisorSeleccionado = "";

    const contenedor = document.getElementById("supervisores");
    const seccionSup = document.getElementById("seccion-supervisores");
    const seccionCat = document.getElementById("seccion-categorias");
    const nombreSup = document.getElementById("nombreSupervisor");

    fetch("supervisor-caminante.json")
      .then(res => res.json())
      .then(data => {
        Object.keys(data).forEach(nombre => {
          const btn = document.createElement("button");

          btn.textContent = nombre;
          btn.className = "btn btn-claro";

          btn.onclick = () => {
            supervisorSeleccionado = nombre;
            nombreSup.textContent = nombre;

            seccionSup.classList.add("hidden");
            seccionCat.classList.remove("hidden");
            seccionCat.classList.add("fade-in");
          };

          contenedor.appendChild(btn);
        });
      })
      .catch(() => {
        console.error("Error cargando supervisores");
      })
      .finally(() => {
        ocultarLoader();
      });

    function ocultarLoader() {
      const loader = document.getElementById("loader");
      loader.style.opacity = "0";
      loader.style.pointerEvents = "none";

      setTimeout(() => {
        loader.style.display = "none";
      }, 400);
    }

    /* fallback por si algo falla */
    setTimeout(ocultarLoader, 4000);

    function redirigir(url) {
      window.location.href = `${url}?supervisor=${encodeURIComponent(supervisorSeleccionado)}`;
    }

    function volver() {
      seccionCat.classList.add("hidden");
      seccionSup.classList.remove("hidden");
    }
  </script>

</body>
</html>
