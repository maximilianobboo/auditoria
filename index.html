<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- IMPORTANTE PARA MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Auditorias MG</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/0yX4db3M/logo-movil.png">

  <!-- Color barra navegador (modo app) -->
  <meta name="theme-color" content="#000000">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(180deg, #000000, #1a1a1a);
      color: white;
      min-height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container-box {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      margin: auto;
      text-align: center;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      width: 140px;
      margin: 20px auto;
      display: block;
    }

    .header {
      font-size: 14px;
      color: #bbb;
      margin-bottom: 10px;
    }

    .selected-name {
      font-weight: bold;
      margin-bottom: 15px;
      color: #ff5252;
    }

    .btn-claro {
      background-color: #d32f2f;
      color: white;
      border: none;
      width: 100%;
      margin-bottom: 12px;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .btn-claro:hover {
      background-color: #ff5252;
      transform: scale(1.02);
    }

    .btn-back {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
    }

    .btn-back:hover {
      background: #222;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container-box">

    <img src="https://i.postimg.cc/prB8Q5s6/logo-claro.png" class="logo" alt="Logo">

    <!-- SECCIÓN SUPERVISORES -->
    <div id="seccion-supervisores">
      <div class="header">Seleccionar Supervisor</div>
      <div id="supervisores"></div>
    </div>

    <!-- SECCIÓN CATEGORÍAS -->
    <div id="seccion-categorias" class="hidden">

      <div class="header">Supervisor seleccionado</div>
      <div id="nombreSupervisor" class="selected-name"></div>

      <div class="header">Seleccionar Categoría</div>

      <button class="btn btn-claro" onclick="redirigir('auditoria.html')">Auditoría</button>
      <button class="btn btn-claro" onclick="redirigir('acompanamiento.html')">Acompañamiento</button>
      <button class="btn btn-claro" onclick="redirigir('clausurado.html')">Clausurado</button>
      <button class="btn btn-claro" onclick="redirigir('prospecto.html')">Prospecto</button>

      <button class="btn btn-back" onclick="volver()">← Cambiar Supervisor</button>
    </div>

  </div>

  <script>
    let supervisorSeleccionado = "";

    const contenedor = document.getElementById("supervisores");
    const seccionSup = document.getElementById("seccion-supervisores");
    const seccionCat = document.getElementById("seccion-categorias");
    const nombreSup = document.getElementById("nombreSupervisor");

    fetch("supervisor-caminante.json")
      .then(res => res.json())
      .then(data => {

        Object.keys(data).forEach(nombre => {
          const btn = document.createElement("button");

          btn.textContent = nombre;
          btn.className = "btn btn-claro";

          btn.onclick = () => {
            supervisorSeleccionado = nombre;

            nombreSup.textContent = nombre;

            seccionSup.classList.add("hidden");
            seccionCat.classList.remove("hidden");
            seccionCat.classList.add("fade-in");
          };

          contenedor.appendChild(btn);
        });

      });

    function redirigir(url) {
      window.location.href = `${url}?supervisor=${encodeURIComponent(supervisorSeleccionado)}`;
    }

    function volver() {
      seccionCat.classList.add("hidden");
      seccionSup.classList.remove("hidden");
    }
  </script>

</body>
</html>
