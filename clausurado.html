<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Clausurados</title>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/0yX4db3M/logo-movil.png">
  <meta name="theme-color" content="#000000">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(180deg, #000000, #1a1a1a);
      color: white;
      margin: 0;
      font-family: Arial;
    }

    .container-app {
      max-width: 480px;
      margin: auto;
      min-height: 100vh;
      background: #111;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    #titulo {
      background: #d32f2f;
      color: #fff;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 15px;
    }

    label {
      margin-top: 12px;
      color: #ccc;
      font-size: 14px;
    }

    .form-control, .form-select {
      background: #222;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px;
    }

    /* 🔴 DROPDOWNS EN ROJO (ORIGINAL RESTAURADO) */
    .form-select.has-value {
      background-color: #d32f2f !important;
      color: #fff !important;
      font-weight: bold;
      border-color: #d32f2f !important;
    }

    .btn-main {
      background: #d32f2f;
      color: white;
      width: 100%;
      margin-top: 18px;
      border: none;
      padding: 14px;
      border-radius: 10px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-menu {
      background: #333;
      color: #ccc;
      flex: 1;
      border-radius: 10px;
      padding: 12px;
    }

    .btn-clear {
      background: #2e7d32;
      color: white;
      flex: 1;
      border-radius: 10px;
      padding: 12px;
      border: none;
    }

    /* ================= LOADER ORIGINAL ================= */
    #loader {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .logo-loader {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .logo-base {
      width: 100%;
      filter: grayscale(100%) brightness(0.5);
    }

    .logo-fill {
      position: absolute;
      inset: 0;
      width: 100%;
      clip-path: inset(100% 0 0 0);
      animation: llenar 2s cubic-bezier(0.65,0,0.35,1) infinite;
    }

    @keyframes llenar {
      0% { clip-path: inset(100% 0 0 0); }
      50% { clip-path: inset(0% 0 0 0); }
      100% { clip-path: inset(100% 0 0 0); }
    }
  </style>
</head>

<body>

<!-- LOADER ORIGINAL -->
<div id="loader">
  <div class="logo-loader">
    <img class="logo-base" src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png">
    <img class="logo-fill" src="https://i.postimg.cc/66GFrCnz/logo-claro-removebg-preview.png">
  </div>
</div>

<div class="container-app">

  <div id="titulo">Clausurados</div>

  <label>Supervisor</label>
  <input id="supervisorInput" class="form-control mb-2" readonly>

  <label>Caminante</label>
  <select id="caminanteSelect" class="form-select mb-2">
    <option value="">Seleccione caminante</option>
  </select>

  <label>Zona</label>
  <select id="zonaSelect" class="form-select mb-2">
    <option value="">Seleccione zona</option>
  </select>

  <label>Código PSR - Nombre PSR</label>
  <select id="psrSelect" class="form-select mb-2">
    <option value="">Seleccione PSR</option>
  </select>

  <label>Observaciones</label>
  <textarea id="observaciones" class="form-control mb-2" rows="3"></textarea>

  <label>Fotos</label>
  <!-- Elegir fotos de la galeria o tomar foto -->
  <input type="file" id="fotos" class="form-control mb-2" multiple accept="image/*">

  <button class="btn btn-main" onclick="enviarAuditoria()">Enviar Auditoría</button>

  <div class="btn-row">
    <button class="btn btn-menu" onclick="volverMenu()">Menú</button>
    <button class="btn btn-clear" onclick="limpiarFormulario()">Borrar formulario</button>
  </div>

</div>

<!-- MODAL OK -->
<div class="modal fade" id="modalOk" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white text-center">
      <div class="modal-header border-0">
        <h5>✔ Auditoría enviada</h5>
      </div>
      <div class="modal-body">Registro guardado correctamente</div>
      <div class="modal-footer border-0">
        <button class="btn btn-success w-100" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ERROR -->
<div class="modal fade" id="modalError" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white text-center">
      <div class="modal-header border-0">
        <h5>⚠ Error</h5>
      </div>
      <div class="modal-body">Complete los campos obligatorios</div>
      <div class="modal-footer border-0">
        <button class="btn btn-danger w-100" data-bs-dismiss="modal">OK</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ================= URLS ================= */
const URL = "https://script.google.com/macros/s/AKfycbwWG6yBeWRJIQhw8hbDcL-vty_EqTju2xD5xJOinWTDF6O7KBpiAD-FlTAvdlhx-2MnmQ/exec";
const API_CAMINANTES = "https://script.google.com/macros/s/AKfycby6OwTzLN8f4H-GraDredyHS-4RcLKc48mZyIqvQ3ef7hFfE6GgNK8zUD5PzhVMInew6Q/exec";
const JSON_PSR = "psragencia.json";

/* ================= SUPERVISOR ================= */
const params = new URLSearchParams(window.location.search);
const supervisor = params.get("supervisor") || "";

document.getElementById("supervisorInput").value = supervisor;
document.getElementById("titulo").textContent = "Clausurados - " + supervisor;

/* ================= LOADER ================= */
function mostrarLoader() {
  document.getElementById("loader").style.display = "flex";
}

function ocultarLoader() {
  document.getElementById("loader").style.display = "none";
}

/* ================= DROPDOWN ROJO ================= */
function actualizarVisual(id) {
  const el = document.getElementById(id);
  if (el.value) el.classList.add("has-value");
  else el.classList.remove("has-value");
}

/* ================= CAMINANTES ================= */
fetch(API_CAMINANTES)
  .then(r => r.json())
  .then(data => {
    const select = document.getElementById("caminanteSelect");
    (data[supervisor] || []).forEach(c => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      select.appendChild(opt);
    });
  });

document.getElementById("caminanteSelect").addEventListener("change", function () {
  actualizarVisual("caminanteSelect");

  fetch(JSON_PSR)
    .then(r => r.json())
    .then(data => {
      const zonas = data.filter(i => i.Caminante === this.value).map(i => i.Zona);

      const zonaSelect = document.getElementById("zonaSelect");
      zonaSelect.innerHTML = '<option value="">Seleccione zona</option>';

      [...new Set(zonas)].forEach(z => {
        const opt = document.createElement("option");
        opt.value = z;
        opt.textContent = z;
        zonaSelect.appendChild(opt);
      });
    });
});

document.getElementById("zonaSelect").addEventListener("change", function () {
  actualizarVisual("zonaSelect");

  fetch(JSON_PSR)
    .then(r => r.json())
    .then(data => {
      const psrList = data.filter(i => i.Zona === this.value);

      const psrSelect = document.getElementById("psrSelect");
      psrSelect.innerHTML = '<option value="">Seleccione PSR</option>';

      psrList.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p["Codigo PSR"];
        opt.textContent = p["Codigo PSR"] + " - " + p["Nombre PSR"];
        psrSelect.appendChild(opt);
      });
    });
});

document.getElementById("psrSelect").addEventListener("change", function () {
  actualizarVisual("psrSelect");
});

/* ================= ENVÍO ================= */
async function enviarAuditoria() {

  const caminante = document.getElementById("caminanteSelect").value;
  const zona = document.getElementById("zonaSelect").value;
  const psrSelect = document.getElementById("psrSelect");

  if (!caminante || !zona || !psrSelect.value) {
    new bootstrap.Modal(document.getElementById("modalError")).show();
    return;
  }

  mostrarLoader();

  try {

    let fotos = [];
    const files = document.getElementById("fotos").files;

    for (let f of files) {
      const base64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(f);
      });
      fotos.push(base64);
    }

    const payload = {
      Supervisor: supervisor,
      Categoria: "Clausurados",
      Caminante: caminante,
      Zona: zona,
      PSR: psrSelect.options[psrSelect.selectedIndex].text,
      Observaciones: document.getElementById("observaciones").value,
      Fotos: fotos.join(", ")
    };

    const res = await fetch(URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    ocultarLoader();

    if (text.includes("OK")) {
      const modal = new bootstrap.Modal(document.getElementById("modalOk"));

      document.getElementById("modalOk").addEventListener("hidden.bs.modal", () => {
        window.location.href = "index.html";
      }, { once: true });

      modal.show();

    } else {
      new bootstrap.Modal(document.getElementById("modalError")).show();
    }

  } catch (e) {
    ocultarLoader();
    new bootstrap.Modal(document.getElementById("modalError")).show();
  }
}

/* ================= UTIL ================= */
function limpiarFormulario() {
  ["caminanteSelect","zonaSelect","psrSelect"].forEach(id => {
    const el = document.getElementById(id);
    el.value = "";
    el.classList.remove("has-value");
  });

  document.getElementById("observaciones").value = "";
  document.getElementById("fotos").value = "";
}

function volverMenu() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
